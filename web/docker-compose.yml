services:
  misplaced_message:
    build: ./misplaced_message
    platform: linux/amd64
    ports:
      - "4000:3000"
    restart: always

  bothersome_blacksmith:
    build: ./bothersome_blacksmith
    platform: linux/amd64
    ports:
      - "4010:3000"
    restart: always

  castle_culling: 
    build: ./castle_culling
    platform: linux/amd64
    ports:
      - "4020:3000"
    restart: always

  abducted_art: 
    build: ./abducted_art
    platform: linux/amd64
    ports:
      - "4030:3000"
    restart: always

  breach_barracks_db:
    image: mongo:6.0
    platform: linux/amd64
    restart: always
    networks:
      - barracks_net

  breach_barracks: 
    build: ./breach_barracks
    platform: linux/amd64
    networks:
      - default
      - barracks_net
    ports:
      - "4040:3000"
    environment:
      - MONGO_URI=mongodb://breach_barracks_db:27017/barracks
      - JWT_SECRET=army
    depends_on:
      - breach_barracks_db
    restart: always

  township_trickery: 
    build: ./township_trickery
    platform: linux/amd64
    ports:
      - "4050:3000"
    restart: always
  
  rewind_release:
    build: ./rewind_release
    platform: linux/amd64
    ports:
      - "4060:3000"
    restart: always

networks:
  barracks_net:
    internal: true