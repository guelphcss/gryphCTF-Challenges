<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Breach Barracks</title>
  </head>
  <body>
    
    <div class="login-box">
      <h1>Barracks Login</h1>
      <p>Present your credentials to the guard.</p>
      
      <div>
        <input type="text" id="username" placeholder="Username" /><br>
        <input type="password" id="password" placeholder="Password" /><br>
        <button onclick="submitLogin()">Submit</button>
      </div>
      <p id="msg"></p>
    </div>

    <script>
      async function submitLogin() {
        const userVal = document.getElementById("username").value;
        const passVal = document.getElementById("password").value;
        const msgBox = document.getElementById("msg");

        msgBox.style.color = "white";
        msgBox.innerText = "Authenticating...";

        try {
          const res = await fetch("/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username: userVal, password: passVal }),
          });
          
          const data = await res.json();

          if (data.redirect) {
            msgBox.style.color = "#4CAF50";
            msgBox.innerText = "Access Granted. Opening gates...";
            setTimeout(() => { window.location.href = data.redirect; }, 1000);
          } else {
            msgBox.style.color = "#f44336"; 
            msgBox.innerText = data.error || "Authentication failed."; 
          }
        } catch (err) {
          msgBox.style.color = "#f44336";
          msgBox.innerText = "Server connection lost.";
        }
      }
    </script>
  </body>
</html>
